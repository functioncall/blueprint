<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagrams — sequence diagrams</title>
<style>:root{ --accent:#B23A2E; --paper:#F3EEE1; --ink:#21201B; --soft:#6B6657;
  --rule:#C6BDA3; --band:#EFE8D8; --bg:#E6DFCD; --grid:#211E1408;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,'Menlo','DejaVu Sans Mono',monospace; }
*{ box-sizing:border-box; }
/* the PAGE never scrolls — only the diagram body does (no scroll from header/toolbar). */
html,body{ margin:0; height:100%; overflow:hidden; overscroll-behavior:none; }
body{ background:var(--bg); color:var(--ink); font-family:var(--mono);
  -webkit-font-smoothing:antialiased; }

/* fixed-viewport frame: a clean app header, then the diagram stage. Only .scroll scrolls. */
.app{ height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* app header — ONE clean bar (no inner vertical dividers; only the bottom rule, which
   aligns with the diagram grid below). brand · project / <scenario ▾> · count */
.appbar{ flex:0 0 auto; display:flex; align-items:center; gap:16px; height:44px; padding:0 16px;
  background:var(--band); border-bottom:1px solid var(--rule); }
.brand{ display:flex; align-items:center; gap:7px; font-weight:700; font-size:13px; white-space:nowrap; }
.brand .mark{ display:flex; align-items:center; }
.brand .mark svg{ height:20px; width:auto; display:block; }
.crumb{ flex:1 1 auto; min-width:0; display:flex; align-items:center; gap:9px; }
.crumb-proj{ color:var(--soft); font-size:12.5px; white-space:nowrap; }
.crumb-sep{ color:var(--rule); }
.barmeta{ flex:0 0 auto; color:var(--soft); font-size:11px; white-space:nowrap; }

/* scenario switcher — the active title IS a dropdown. No ancestor clips (so the menu can
   escape downward); only the title text itself ellipsises. */
.switch{ position:relative; min-width:0; flex:0 1 auto; display:flex; }
.switch-btn{ display:inline-flex; align-items:center; gap:8px; min-width:0; max-width:100%; cursor:pointer;
  font:inherit; background:none; border:0; padding:3px 7px; margin-left:-7px; border-radius:6px; color:var(--ink); }
.switch-btn:hover{ background:#0000000d; }
/* with 2+ scenarios the title IS a dropdown — make it an obvious pill CTA, and never truncate it */
.app:not(.solo) .switch-btn{ background:var(--paper); border:1px solid var(--rule);
  padding:4px 11px; margin-left:0; box-shadow:0 1px 2px #00000012; }
.app:not(.solo) .switch-btn:hover{ border-color:var(--soft); background:#fff8; }
.switch-title{ min-width:0; font-weight:700; font-size:13px; white-space:nowrap; }
.switch-caret{ color:var(--ink); font-size:12px; line-height:1; }
.app.solo .switch-btn{ cursor:default; }
.app.solo .switch-btn:hover{ background:none; }
.app.solo .switch-caret{ display:none; }
.switch-menu{ position:absolute; top:calc(100% + 6px); left:-7px; z-index:40;
  min-width:320px; max-width:460px; max-height:72vh; overflow:auto;
  background:var(--paper); border:1px solid var(--rule); box-shadow:0 12px 32px -12px #0008; }
.switch-menu[hidden]{ display:none; }
.mitem{ display:block; width:100%; text-align:left; cursor:pointer; font:inherit; color:var(--ink);
  background:none; border:0; border-bottom:1px solid var(--rule); border-left:3px solid transparent;
  padding:9px 13px; }
.mitem:last-child{ border-bottom:0; }
.mitem:hover{ background:#0000000a; }
.mitem.active{ border-left-color:var(--accent); background:#0000000f; }
.mi-title{ display:block; font-size:12px; font-weight:700; }
.mi-sub{ display:block; margin-top:2px; font-size:10.5px; color:var(--soft);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* stage — the one active scenario, full width + full height */
.stage{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; background:var(--paper); }
.card{ display:none; flex:1 1 auto; min-height:0; flex-direction:column; }
.card.active{ display:flex; }

/* pinned swimlane header above the scrolling body. The geometry is already full-bleed —
   layout.py spreads the columns to fill FILL_W, so every scenario has the SAME natural width
   regardless of column count. width:100% then maps that one width onto the viewport, so the
   on-screen scale is identical across scenarios (no per-count inflation) and fills the width. */
.head{ flex:0 0 auto; overflow:hidden; border-bottom:1px solid var(--rule); }
.head svg{ display:block; width:100%; height:auto; }
/* the ONLY scroll container; the engineering-paper grid tiles the whole area so the canvas
   feel continues into any space below a short diagram (grid is texture, never load-bearing). */
.scroll{ flex:1 1 auto; min-height:0; overflow:auto; overscroll-behavior:contain;
  background-color:var(--paper);
  background-image:linear-gradient(var(--grid) 1px, transparent 1px),
                   linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:23px 23px; }
.diagram{ display:block; }
.diagram svg{ display:block; width:100%; height:auto; }

/* toolbar — bottom row of control cells (lens toggles, legend, export) */
.toolbar{ flex:0 0 auto; display:flex; align-items:stretch; height:36px; overflow-x:auto;
  border-top:1px solid var(--rule); background:var(--band); }
.lenses{ display:flex; align-items:stretch; }
.lens{ display:flex; align-items:center; white-space:nowrap; padding:0 13px;
  border:0; border-right:1px solid var(--rule); background:none; font:inherit; font-size:11px;
  cursor:pointer; color:var(--soft); }
.lens:hover{ color:var(--ink); background:#0000000a; }
.lens.on{ background:var(--ink); color:var(--paper); }
.tb-right{ margin-left:auto; display:flex; align-items:stretch; }
.legends{ display:flex; align-items:center; padding:0 14px; border-left:1px solid var(--rule); }
.png{ display:flex; align-items:center; white-space:nowrap; padding:0 14px;
  border:0; border-left:1px solid var(--rule); background:none; font:inherit; font-size:11px;
  cursor:pointer; color:var(--ink); }
.png:hover{ background:#0000000a; }
.legend{ font-size:11px; color:var(--soft); display:flex; align-items:center; gap:7px; white-space:nowrap; }
.legend[hidden]{ display:none!important; }
.legend .sw{ width:11px; height:11px; border-radius:2px; display:inline-block; }
.legend .ramp{ width:80px; height:9px; display:inline-block; border-radius:2px;
  background:linear-gradient(90deg,#2FA05A,#9FB83C,#E6B12E,#E07B2A,#C0392B); }

/* messages: entrance + interactive states */
.msg{ animation:rise .5s ease both; animation-delay:var(--d); }
@keyframes rise{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
.msg .arrow.sync{ stroke-dasharray:var(--len); stroke-dashoffset:var(--len);
  animation:draw .55s ease forwards; animation-delay:var(--d); }
@keyframes draw{ to{ stroke-dashoffset:0 } }
.msg{ cursor:pointer; }
.mtx{ paint-order:stroke; }

/* hover-dim */
.diagram.hov .msg:not(.hl){ opacity:.16; }

/* path lens */
.lens-path .msg{ opacity:.16; transition:opacity .2s; }
.msg.lit{ opacity:1!important; }
.msg.lit .arrow{ stroke:var(--accent)!important; }
.msg.lit .ah{ fill:var(--accent)!important; stroke:var(--accent)!important; }
.msg.lit .mtx{ fill:var(--accent); }
.msg.lit .tmark *{ stroke:var(--accent)!important; }

/* metric lenses */
.diagram.lens-cost .msg:not(.has-cost),
.diagram.lens-lat .msg:not(.has-lat){ opacity:.14; }
.diagram.lens-cost .msg.has-cost .arrow{ stroke:var(--c-cost)!important; stroke-width:3.4; }
.diagram.lens-cost .msg.has-cost .ah{ fill:var(--c-cost)!important; stroke:var(--c-cost)!important; }
.diagram.lens-lat .msg.has-lat .arrow{ stroke:var(--c-lat)!important; stroke-width:3.4; }
.diagram.lens-lat .msg.has-lat .ah{ fill:var(--c-lat)!important; stroke:var(--c-lat)!important; }

/* click-detail card — tiered: why headline · route sub-line · guard · prose · chips · footer */
.popover{ position:fixed; z-index:50; max-width:340px; min-width:210px; background:var(--paper);
  border:1px solid var(--ink); padding:11px 13px; font-size:11.5px; line-height:1.45;
  box-shadow:0 10px 30px -8px #0008; }
.popover[hidden]{ display:none; }
.popover.docked{ left:auto!important; top:auto!important; right:14px; bottom:14px;
  max-height:calc(100vh - 28px); overflow:auto; }
.p-why{ font-weight:700; font-size:12.5px; margin-bottom:3px; }
.p-route{ color:var(--soft); font-size:10.5px; }
.p-guard{ color:var(--soft); font-size:10.5px; margin-top:3px; }
.p-body{ display:flex; flex-direction:column; gap:4px; margin-top:8px; }
.p-row{ display:flex; gap:8px; }
.p-row .pl{ flex:0 0 44px; color:var(--soft); text-transform:uppercase;
  font-size:9px; letter-spacing:.05em; padding-top:1px; }
.p-chips{ display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.p-chips .chip{ background:var(--band); border:1px solid var(--rule); border-radius:10px;
  padding:1px 8px; font-size:10px; color:var(--ink); }
.p-foot{ color:var(--soft); font-size:10px; margin-top:8px;
  border-top:1px solid var(--rule); padding-top:6px; }

@media (prefers-reduced-motion:reduce){
  .msg, .msg .arrow.sync{ animation:none!important; stroke-dashoffset:0!important; opacity:1; }
}
</style>

<script>(function(){
  "use strict";
  var pop = document.getElementById('pop');
  function esc(s){ return (s||'').replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  // ── scenario switcher (dropdown in the header) ──────────────────────────────
  var cards     = Array.prototype.slice.call(document.querySelectorAll('.card'));
  var mitems    = Array.prototype.slice.call(document.querySelectorAll('.mitem'));
  var menu      = document.getElementById('switchMenu');
  var switchBtn = document.getElementById('switchBtn');
  var crumbTitle= document.getElementById('crumbTitle');
  var barCount  = document.getElementById('barCount');

  function closeMenu(){ if(menu){ menu.hidden = true; } if(switchBtn){ switchBtn.setAttribute('aria-expanded','false'); } }
  function select(sid){
    var card = null;
    cards.forEach(function(c){ var on = c.dataset.card === sid; c.classList.toggle('active', on); if(on) card = c; });
    mitems.forEach(function(m){ m.classList.toggle('active', m.dataset.target === sid); });
    if(card && crumbTitle) crumbTitle.textContent = card.dataset.title || '';
    closeMenu(); pop.hidden = true;
  }
  mitems.forEach(function(m){
    m.addEventListener('click', function(e){ e.stopPropagation(); select(m.dataset.target); });
  });

  if(barCount) barCount.textContent = cards.length + (cards.length === 1 ? ' scenario' : ' scenarios');
  var act = document.querySelector('.card.active') || cards[0];
  if(act) select(act.dataset.card);

  // open/close the dropdown
  if(switchBtn && menu && mitems.length){
    switchBtn.addEventListener('click', function(e){
      e.stopPropagation();
      var open = menu.hidden;
      menu.hidden = !open;
      switchBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    document.addEventListener('click', closeMenu);
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeMenu(); });
  }

  // keyboard: ↑/↓ or j/k to cycle scenarios
  document.addEventListener('keydown', function(e){
    if(cards.length < 2) return;
    if(e.target && /^(INPUT|TEXTAREA)$/.test(e.target.tagName)) return;
    var dir = (e.key === 'ArrowDown' || e.key === 'j') ? 1
            : (e.key === 'ArrowUp'   || e.key === 'k') ? -1 : 0;
    if(!dir) return;
    var ai = cards.findIndex(function(c){ return c.classList.contains('active'); });
    var nx = Math.max(0, Math.min(cards.length - 1, (ai < 0 ? 0 : ai) + dir));
    select(cards[nx].dataset.card); e.preventDefault();
  });

  // ── colour lens (per card; one active at a time) ──────────────────────────
  function setLens(card, lens){
    var dia = card.querySelector('.diagram');
    dia.className = 'diagram';
    card.querySelectorAll('.msg.lit').forEach(function(m){ m.classList.remove('lit'); });
    card.querySelectorAll('.legend').forEach(function(l){ l.hidden = true; });
    var lg;
    if(lens === 'none'){ dia.classList.add('lens-none'); lg = card.querySelector('.lg-none'); }
    else if(lens.indexOf('path-') === 0){
      dia.classList.add('lens-path');
      card.querySelectorAll('.msg.p-' + lens.slice(5)).forEach(function(m){ m.classList.add('lit'); });
      lg = card.querySelector('.lg-' + lens);
    }
    else if(lens === 'cost'){ dia.classList.add('lens-cost'); lg = card.querySelector('.lg-cost'); }
    else if(lens === 'lat'){ dia.classList.add('lens-lat'); lg = card.querySelector('.lg-lat'); }
    if(lg) lg.hidden = false;
    card.querySelectorAll('.lens').forEach(function(b){ b.classList.toggle('on', b.dataset.lens === lens); });
  }

  // ── in-browser PNG export — stitch header + body SVGs onto one canvas ──────
  function svgImg(svg){
    return new Promise(function(res){
      var img = new Image();
      img.onload = function(){ res(img); };
      img.src = 'data:image/svg+xml;charset=utf-8,' +
                encodeURIComponent(new XMLSerializer().serializeToString(svg));
    });
  }
  function exportPNG(card){
    var hs = card.querySelector('.head svg'), bs = card.querySelector('.scroll svg');
    var W = +hs.getAttribute('width'), HH = +hs.getAttribute('height'), BH = +bs.getAttribute('height');
    var sc = 2, cv = document.createElement('canvas');
    cv.width = W * sc; cv.height = (HH + BH) * sc;
    var cx = cv.getContext('2d'); cx.scale(sc, sc);
    Promise.all([svgImg(hs), svgImg(bs)]).then(function(imgs){
      cx.drawImage(imgs[0], 0, 0);
      cx.drawImage(imgs[1], 0, HH);
      var a = document.createElement('a');
      a.download = (card.dataset.card || 'diagram') + '.png';
      a.href = cv.toDataURL('image/png'); a.click();
    });
  }

  // ── wire each card (lenses, export, hover-dim) ─────────────────────────────
  cards.forEach(function(card){
    var pngBtn = card.querySelector('.png');
    if(pngBtn) pngBtn.addEventListener('click', function(){ exportPNG(card); });
    card.querySelectorAll('.lens').forEach(function(b){
      b.addEventListener('click', function(){ setLens(card, b.dataset.lens); });
    });
    var dia = card.querySelector('.diagram');
    dia.addEventListener('mouseover', function(e){
      var g = e.target.closest('.msg'); if(g){ dia.classList.add('hov'); g.classList.add('hl'); }
    });
    dia.addEventListener('mouseout', function(e){
      var g = e.target.closest('.msg');
      if(g){ g.classList.remove('hl'); if(!dia.querySelector('.msg.hl')) dia.classList.remove('hov'); }
    });
  });

  // ── click-a-message detail card ────────────────────────────────────────────
  // Tiers: WHY headline · readable route/step/phase sub-line · guard · prose body
  // (what-changes / on-failure) · fact chips (sends/auth/ordering/cost) · src+age footer.
  // Header + footer are deterministic; the body shows only the AI `detail` keys present.
  function row(label, val){
    return '<div class="p-row"><span class="pl">' + esc(label) + '</span><span>' + esc(val) + '</span></div>';
  }
  function chip(val){ return '<span class="chip">' + esc(val) + '</span>'; }
  function buildCard(g){
    var d = g.dataset, h = '';
    // headline = the WHY; with no detail, lead with the readable route (a normal arrow) or the
    // label itself (self/note, where the label is the substance) — never repeat a normal arrow's label.
    var contentLed = (d.type === 'note' || d.type === 'self');
    var head = d.why || (contentLed ? d.full : d.route) || d.full || '(message)';
    h += '<div class="p-why">' + esc(head) + '</div>';
    var sub = [];
    if(d.route && d.route !== head) sub.push(d.route);
    if(d.step)  sub.push('step ' + d.step);
    if(d.phase) sub.push(d.phase);
    if(sub.length) h += '<div class="p-route">' + esc(sub.join('  ·  ')) + '</div>';
    if(d.frag) h += '<div class="p-guard">⋔ ' + esc(d.frag) + '</div>';
    var body = '';
    if(d.effects) body += row('Changes', d.effects);
    if(d.fails)   body += row('On fail', d.fails);
    if(body) h += '<div class="p-body">' + body + '</div>';
    var chips = '';
    if(d.sends)    chips += chip(d.sends);
    if(d.auth)     chips += chip(d.auth);
    if(d.ordering) chips += chip(d.ordering);
    if(d.metrics)  chips += chip(d.metrics);
    if(chips) h += '<div class="p-chips">' + chips + '</div>';
    var foot = [];
    if(d.src) foot.push(d.src);
    var card = g.closest('.card'), age = card && card.dataset.updated;
    if(age) foot.push(age);                                   // research age → staleness + AI-derived signal
    if(foot.length) h += '<div class="p-foot">' + esc(foot.join('  ·  ')) + '</div>';
    return h;
  }
  document.addEventListener('click', function(e){
    if(pop.contains(e.target)) return;                        // clicks INSIDE the card never dismiss it
    var g = e.target.closest('.msg');
    if(!g){ pop.hidden = true; return; }
    pop.classList.remove('docked');
    pop.innerHTML = buildCard(g);
    pop.hidden = false;
    pop.style.left = '0px'; pop.style.top = '0px';            // measure at a known origin
    if(pop.offsetHeight > innerHeight - 24){                  // too tall to float → dock + scroll
      pop.classList.add('docked'); return;
    }
    var x = Math.max(8, Math.min(e.clientX + 12, innerWidth - pop.offsetWidth - 8));
    var y = Math.max(8, Math.min(e.clientY + 12, innerHeight - pop.offsetHeight - 8));
    pop.style.left = x + 'px'; pop.style.top = y + 'px';
  });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') pop.hidden = true; });
})();
</script>
</body></html>
